# -------------------------------------------------------
# Database \u2014 use H2 in-memory instead of PostgreSQL
# -------------------------------------------------------
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
# These two lines force H2 dialect, overriding PostgreSQLDialect from main config
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# -------------------------------------------------------
# Eureka \u2014 disable so tests don't need a running registry
# -------------------------------------------------------
# -------------------------------------------------------
# Kafka \u2014 overridden per-test via @EmbeddedKafka
# (kept here as safe fallback)
spring.kafka.listener.auto-startup=false
# -------------------------------------------------------
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.group-id=response-service-group