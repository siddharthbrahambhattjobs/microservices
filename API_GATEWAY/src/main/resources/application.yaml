server:
  port: 8151

spring:
  application:
    name: apigateway-server-svc

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope: openid, email, profile
            redirect-uri: "{baseUrl}/login/oauth2/code/google"
        provider:
          google:
            issuer-uri: https://accounts.google.com

  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: caller-service
              uri: http://${CALLER_SERVER_SVC:localhost}:8153
              predicates:
                - Path=/caller/**
            - id: response-service
              uri: http://${RESPONSE_SERVER_SVC:localhost}:8154
              predicates:
                - Path=/response/**

  data:
    redis:
      host: localhost
      port: 6379

app:
  jwt:
    secret: 1234567890123456789012345678901234567890123456789012345678901234
    expiry-minutes: 60
  frontend:
    url: http://localhost:4200

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized

logging:
  level:
    in:
      co: DEBUG
    org:
      springframework:
        security: DEBUG