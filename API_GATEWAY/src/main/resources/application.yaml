server:
  port: 8151

spring:
  application:
    name: apigateway-server-svc

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://accounts.google.com
  
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: caller-service
              uri: http://${CALLER_SERVER_SVC:localhost}:8153
              predicates:
                - Path=/caller/**
            - id: response-service
              uri: http://${RESPONSE_SERVER_SVC:localhost}:8154
              predicates:
                - Path=/response/**

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/postgresjpa
    username: postgres
    password: root
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000

  jpa:
    hibernate:
      ddl-auto: update

  cache:
    type: simple

  data:
    jpa:
      repositories:
        bootstrap-mode: deferred

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized

logging:
  level:
    in:
      co: INFO
    org:
      springframework:
        security: WARN
  # No logging.pattern.* block needed — logback-spring.xml handles all
  # JSON formatting via LogstashEncoder.