apiVersion: flagger.app/v1beta1
kind: Canary
metadata:
  name: caller-service-app
  namespace: microservices
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: caller-service-app
  service:
    port: 8153
    targetPort: 8153
    # Each canary must have a unique name matching its K8s Service name.
    # Flagger uses this to create the VirtualService and DestinationRule.
    # Without this, all canaries create resources named "http" and conflict.
    name: caller-server-svc
  analysis:
    interval: 1m
    threshold: 5
    maxWeight: 50
    stepWeight: 10
    metrics:
    - name: request-success-rate
      thresholdRange:
        min: 99
      interval: 1m
    - name: request-duration
      thresholdRange:
        max: 500
      interval: 1m
    webhooks:
    - name: acceptance-test
      type: pre-rollout
      url: http://flagger-loadtester.microservices/
      timeout: 30s
      metadata:
        type: bash
        cmd: "curl -s http://caller-server-svc-canary.microservices:8153/actuator/health | grep UP"