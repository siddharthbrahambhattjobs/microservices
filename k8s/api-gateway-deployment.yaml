apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: microservices
spec:
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
        version: v1
      annotations:
        proxy.istio.io/config: '{ "holdApplicationUntilProxyStarts": true }'
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8151"
        traffic.sidecar.istio.io/excludeOutboundPorts: "5432"
    spec:
      containers:
      - name: api-gateway
        image: sidbhatt94/api-gateway
        imagePullPolicy: Always
        ports:
        - containerPort: 8151
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8151
          initialDelaySeconds: 30
          periodSeconds: 15
          failureThreshold: 3
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8151
          initialDelaySeconds: 15
          periodSeconds: 10
          failureThreshold: 5
          timeoutSeconds: 5
        startupProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8151
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 15
          timeoutSeconds: 5
        env:
        - name: JAVA_TOOL_OPTIONS
          value: >-
            -XX:+UseContainerSupport
            -XX:MaxRAMPercentage=70.0
            -XX:InitialRAMPercentage=50.0
            -XX:+ExitOnOutOfMemoryError
            -Xss256k
        envFrom:
        - configMapRef:
            name: client-cm
        - configMapRef:
            name: db-cm
        resources:
          requests:
            memory: "512Mi"
            cpu: "200m"
          limits:
            memory: "768Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: apigateway-server-svc
  namespace: microservices
spec:
  type: LoadBalancer
  selector:
    app: api-gateway
  ports:
  - name: http
    port: 8151
    targetPort: 8151