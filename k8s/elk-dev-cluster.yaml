apiVersion: v1
kind: Service
metadata:
  name: elasticsearch-client
  namespace: microservices
spec:
  ports:
  - port: 9200
    name: http
  selector:
    app: elasticsearch
---
# Elasticsearch StatefulSet
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: elasticsearch
  namespace: microservices
spec:
  selector:
    matchLabels:
      app: elasticsearch
  serviceName: elasticsearch-client
  replicas: 1
  template:
    metadata:
      labels:
        app: elasticsearch
      annotations:
        proxy.istio.io/config: '{ "holdApplicationUntilProxyStarts": true }'
    spec:
      containers:
      - name: elasticsearch
        image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
        ports:
        - containerPort: 9200
        env:
        - name: discovery.type
          value: "single-node"
        - name: xpack.security.enabled
          value: "false"
        - name: node.roles
          value: "master,data"
        - name: ES_JAVA_OPTS
          value: "-Xms512m -Xmx512m -Dxpack.ml.enabled=false"
        resources:
          requests:
            memory: "800Mi"
            cpu: "1000m"
          limits:
            memory: "1200Mi"
            cpu: "2000m"
        volumeMounts:
        - name: elasticsearch-data
          mountPath: /usr/share/elasticsearch/data
  volumeClaimTemplates:
  - metadata:
      name: elasticsearch-data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 10Gi
---
# Kibana Service
apiVersion: v1
kind: Service
metadata:
  name: kibana
  namespace: microservices
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 5601
  selector:
    app: kibana
---
# Kibana Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kibana
  namespace: microservices
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kibana
  template:
    metadata:
      labels:
        app: kibana
      annotations:
        proxy.istio.io/config: '{ "holdApplicationUntilProxyStarts": true }'
    spec:
      containers:
      - name: kibana
        image: docker.elastic.co/kibana/kibana:8.12.0
        ports:
        - containerPort: 5601
        env:
        - name: ELASTICSEARCH_HOSTS
          value: "http://elasticsearch-client.microservices.svc.cluster.local:9200"
        - name: xpack.security.encryptionKey
          value: "a_random_32_character_string_for_security_123!"
        - name: xpack.encryptedSavedObjects.encryptionKey
          value: "a_random_32_character_string_for_saved_objects!"
        - name: xpack.reporting.encryptionKey
          value: "a_random_32_character_string_for_reporting_123!"
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"